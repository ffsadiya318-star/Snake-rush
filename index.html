<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Snake — Glass</title>
<style>
  :root{
    --glass-bg: rgba(255,255,255,0.12);
    --glass-bg-strong: rgba(255,255,255,0.22);
    --glass-border: rgba(255,255,255,0.35);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.25);
    --accent-a: #7C5CFF;
    --accent-b: #34D9D9;
    --accent-c: #FF6FD8;
    --food: #FF5E62;
    --text-main: #F5F6FA;
    --text-dim: rgba(245,246,250,0.65);
    --radius-lg: 28px;
    --radius-md: 18px;
    --radius-sm: 12px;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0; height:100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", "Helvetica Neue", "Noto Sans Sinhala", sans-serif;
    color: var(--text-main);
    overflow: hidden;
  }

  body{
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(124,92,255,0.55), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(52,217,217,0.45), transparent 50%),
      radial-gradient(circle at 75% 85%, rgba(255,111,216,0.40), transparent 50%),
      radial-gradient(circle at 20% 90%, rgba(255,94,98,0.30), transparent 45%),
      linear-gradient(135deg, #1B1535 0%, #0D1024 55%, #150E2A 100%);
    background-size: 200% 200%, 200% 200%, 200% 200%, 200% 200%, 100% 100%;
    animation: drift 18s ease-in-out infinite alternate;
  }

  @keyframes drift{
    0%   { background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 0 0; }
    100% { background-position: 30% 30%, 70% 20%, 70% 80%, 30% 70%, 0 0; }
  }

  /* floating ambient blobs for extra depth */
  .blob{
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.5;
    z-index: 0;
    pointer-events: none;
  }
  .blob1{ width: 280px; height: 280px; background: var(--accent-a); top: -80px; left: -80px; animation: float1 12s ease-in-out infinite; }
  .blob2{ width: 220px; height: 220px; background: var(--accent-b); bottom: -60px; right: -60px; animation: float2 14s ease-in-out infinite; }

  @keyframes float1{
    0%,100%{ transform: translate(0,0); }
    50%{ transform: translate(40px, 30px); }
  }
  @keyframes float2{
    0%,100%{ transform: translate(0,0); }
    50%{ transform: translate(-30px, -40px); }
  }

  .app{
    position: relative;
    z-index: 1;
    width: min(94vw, 460px);
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* Top glass bar: score / best */
  .topbar{
    width: 100%;
    display:flex;
    gap: 12px;
  }

  .glass{
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.25);
  }

  .stat-card{
    flex:1;
    padding: 12px 16px;
    text-align: center;
  }
  .stat-label{
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2px;
    font-weight: 600;
  }
  .stat-value{
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(90deg, #fff, #cfd3ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* Title pill */
  .title-pill{
    padding: 8px 22px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 0.02em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .title-pill .dot{
    width:8px; height:8px; border-radius:50%;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-c));
    box-shadow: 0 0 10px var(--accent-c);
  }

  /* Game board glass frame */
  .board-frame{
    position: relative;
    padding: 14px;
    border-radius: var(--radius-lg);
    width: 100%;
    aspect-ratio: 1 / 1;
  }

  .board-inner{
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: calc(var(--radius-lg) - 10px);
    overflow: hidden;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.18);
  }

  canvas{
    display:block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  /* Overlay for start / game over */
  .overlay{
    position:absolute;
    inset: 14px;
    border-radius: calc(var(--radius-lg) - 10px);
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    gap: 14px;
    text-align:center;
    padding: 24px;
    background: rgba(10,8,25,0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: opacity .25s ease, visibility .25s ease;
    z-index: 5;
  }
  .overlay.hidden{
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .overlay h2{
    margin:0;
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent-c), var(--accent-b));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .overlay p{
    margin:0;
    color: var(--text-dim);
    font-size: 14px;
    max-width: 260px;
    line-height: 1.5;
  }

  .btn{
    appearance: none;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg-strong);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    color: var(--text-main);
    font-weight: 700;
    font-size: 15px;
    padding: 12px 28px;
    border-radius: 999px;
    box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.3);
    cursor: pointer;
    transition: transform .12s ease, background .2s ease;
  }
  .btn:active{ transform: scale(0.95); }
  .btn.primary{
    background: linear-gradient(135deg, var(--accent-a), var(--accent-c));
    border: none;
  }

  /* Bottom controls (D-pad), glass style, for touch/mobile */
  .controls{
    display:grid;
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px);
    gap: 8px;
    margin-top: 4px;
  }
  .pad-btn{
    border-radius: var(--radius-sm);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 22px;
    color: var(--text-main);
    user-select:none;
    cursor:pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .pad-btn:active{
    transform: scale(0.9);
    background: var(--glass-bg-strong);
  }
  .pad-up{ grid-column:2; grid-row:1; }
  .pad-left{ grid-column:1; grid-row:2; }
  .pad-right{ grid-column:3; grid-row:2; }
  .pad-down{ grid-column:2; grid-row:3; }
  .pad-empty{ visibility:hidden; }

  .hint{
    font-size: 12px;
    color: var(--text-dim);
    text-align:center;
    margin-top: -4px;
  }

  @media (min-width: 640px){
    .hint{ opacity: 0.7; }
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="app">

  <div class="title-pill glass">
    <span class="dot"></span>
    Snake
  </div>

  <div class="topbar">
    <div class="stat-card glass">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card glass">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best">0</div>
    </div>
  </div>

  <div class="board-frame glass">
    <div class="board-inner">
      <canvas id="game"></canvas>

      <div class="overlay" id="startOverlay">
        <h2>Snake</h2>
        <p>ආරම්භ කරන්න Start ඔබන්න. Arrow keys / WASD හෝ පහත D-pad එක පාවිච්චි කරන්න.</p>
        <button class="btn primary" id="startBtn">Start</button>
      </div>

      <div class="overlay hidden" id="overOverlay">
        <h2>Game Over</h2>
        <p id="overScoreText">Score: 0</p>
        <button class="btn primary" id="restartBtn">Play Again</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="pad-btn pad-empty"></div>
    <div class="pad-btn glass pad-up" data-dir="up">⌃</div>
    <div class="pad-btn pad-empty"></div>

    <div class="pad-btn glass pad-left" data-dir="left">⌃</div>
    <div class="pad-btn pad-empty"></div>
    <div class="pad-btn glass pad-right" data-dir="right">⌃</div>

    <div class="pad-btn pad-empty"></div>
    <div class="pad-btn glass pad-down" data-dir="down">⌃</div>
    <div class="pad-btn pad-empty"></div>
  </div>

  <div class="hint">Swipe screen එක මතත් control කරන්න පුළුවන්</div>

</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const startOverlay = document.getElementById('startOverlay');
  const overOverlay = document.getElementById('overOverlay');
  const overScoreText = document.getElementById('overScoreText');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');

  const GRID = 18; // cells per side
  let cellSize = 0;

  function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cellSize = rect.width / GRID;
  }

  let snake, dir, nextDir, food, score, best, running, loopId, speedMs;

  function loadBest(){
    try{
      const v = parseInt(localStorage.getItem('snakeGlassBest') || '0', 10);
      return isNaN(v) ? 0 : v;
    }catch(e){ return 0; }
  }
  function saveBest(v){
    try{ localStorage.setItem('snakeGlassBest', String(v)); }catch(e){}
  }

  function resetGame(){
    const mid = Math.floor(GRID/2);
    snake = [
      {x: mid-1, y: mid},
      {x: mid-2, y: mid},
      {x: mid-3, y: mid}
    ];
    dir = {x:1, y:0};
    nextDir = {x:1, y:0};
    score = 0;
    speedMs = 130;
    scoreEl.textContent = '0';
    placeFood();
    running = true;
  }

  function placeFood(){
    let valid = false;
    while(!valid){
      food = {
        x: Math.floor(Math.random()*GRID),
        y: Math.floor(Math.random()*GRID)
      };
      valid = !snake.some(s => s.x===food.x && s.y===food.y);
    }
  }

  function setDirection(nx, ny){
    // prevent reversing directly into itself
    if(dir.x === -nx && dir.y === -ny) return;
    nextDir = {x:nx, y:ny};
  }

  function gameStep(){
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wrap around edges (smooth, no instant death on wall — more fun on mobile glass UI)
    if(head.x < 0) head.x = GRID-1;
    if(head.x >= GRID) head.x = 0;
    if(head.y < 0) head.y = GRID-1;
    if(head.y >= GRID) head.y = 0;

    // self collision
    if(snake.some(s => s.x===head.x && s.y===head.y)){
      gameOver();
      return;
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y){
      score++;
      scoreEl.textContent = String(score);
      if(speedMs > 60) speedMs -= 2;
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function gameOver(){
    running = false;
    clearTimeout(loopId);
    if(score > best){
      best = score;
      saveBest(best);
      bestEl.textContent = String(best);
    }
    overScoreText.textContent = 'Score: ' + score;
    overOverlay.classList.remove('hidden');
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y,   x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x,   y+h, r);
    ctx.arcTo(x,   y+h, x,   y,   r);
    ctx.arcTo(x,   y,   x+w, y,   r);
    ctx.closePath();
  }

  function draw(){
    const rect = canvas.getBoundingClientRect();
    const W = rect.width, H = rect.height;
    ctx.clearRect(0,0,W,H);

    // subtle grid
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    for(let i=1;i<GRID;i++){
      ctx.beginPath();
      ctx.moveTo(i*cellSize, 0);
      ctx.lineTo(i*cellSize, H);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i*cellSize);
      ctx.lineTo(W, i*cellSize);
      ctx.stroke();
    }
    ctx.restore();

    // food — glowing glass orb
    const fx = food.x*cellSize, fy = food.y*cellSize;
    ctx.save();
    ctx.shadowColor = 'rgba(255,94,98,0.9)';
    ctx.shadowBlur = 16;
    const fg = ctx.createRadialGradient(
      fx+cellSize*0.35, fy+cellSize*0.3, 1,
      fx+cellSize/2, fy+cellSize/2, cellSize*0.6
    );
    fg.addColorStop(0, '#FFB199');
    fg.addColorStop(1, '#FF5E62');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.arc(fx+cellSize/2, fy+cellSize/2, cellSize*0.38, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // snake — glass gradient segments
    for(let i=snake.length-1; i>=0; i--){
      const seg = snake[i];
      const x = seg.x*cellSize, y = seg.y*cellSize;
      const pad = cellSize*0.12;
      const isHead = i===0;

      ctx.save();
      const grad = ctx.createLinearGradient(x, y, x+cellSize, y+cellSize);
      if(isHead){
        grad.addColorStop(0, '#9F8CFF');
        grad.addColorStop(1, '#34D9D9');
        ctx.shadowColor = 'rgba(124,92,255,0.6)';
        ctx.shadowBlur = 10;
      } else {
        const t = i / snake.length;
        grad.addColorStop(0, `rgba(124,92,255,${0.85 - t*0.4})`);
        grad.addColorStop(1, `rgba(52,217,217,${0.85 - t*0.4})`);
      }
      ctx.fillStyle = grad;
      roundRect(x+pad, y+pad, cellSize-pad*2, cellSize-pad*2, cellSize*0.28);
      ctx.fill();

      // glass highlight
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#ffffff';
      roundRect(x+pad*1.4, y+pad*1.4, (cellSize-pad*2)*0.6, (cellSize-pad*2)*0.35, cellSize*0.18);
      ctx.fill();
      ctx.restore();
    }
  }

  function loop(){
    if(!running) return;
    gameStep();
    if(running){
      loopId = setTimeout(loop, speedMs);
    }
  }

  function startGame(){
    resizeCanvas();
    resetGame();
    startOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
    draw();
    clearTimeout(loopId);
    loop();
  }

  // keyboard
  window.addEventListener('keydown', (e)=>{
    const k = e.key.toLowerCase();
    if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
    if(k==='arrowup' || k==='w') setDirection(0,-1);
    else if(k==='arrowdown' || k==='s') setDirection(0,1);
    else if(k==='arrowleft' || k==='a') setDirection(-1,0);
    else if(k==='arrowright' || k==='d') setDirection(1,0);
  }, {passive:false});

  // d-pad buttons
  document.querySelectorAll('.pad-btn[data-dir]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const d = btn.getAttribute('data-dir');
      if(d==='up') setDirection(0,-1);
      else if(d==='down') setDirection(0,1);
      else if(d==='left') setDirection(-1,0);
      else if(d==='right') setDirection(1,0);
    });
  });

  // swipe controls on board
  let touchStart = null;
  const boardInner = document.querySelector('.board-inner');
  boardInner.addEventListener('touchstart', (e)=>{
    const t = e.changedTouches[0];
    touchStart = {x: t.clientX, y: t.clientY};
  }, {passive:true});
  boardInner.addEventListener('touchend', (e)=>{
    if(!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if(Math.abs(dx) < 20 && Math.abs(dy) < 20) { touchStart = null; return; }
    if(Math.abs(dx) > Math.abs(dy)){
      setDirection(dx>0?1:-1, 0);
    } else {
      setDirection(0, dy>0?1:-1);
    }
    touchStart = null;
  }, {passive:true});

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  window.addEventListener('resize', ()=>{
    resizeCanvas();
    if(snake) draw();
  });

  // init
  best = loadBest();
  bestEl.textContent = String(best);
  resizeCanvas();
  resetGame();
  running = false;
  draw();
})();
</script>

</body>
</html>
